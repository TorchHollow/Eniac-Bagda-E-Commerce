<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <title>Dashboard de Vendas</title>

</head>
<body>

  <main class="container">
    <section class="grid">
      <div class="card">
        <h2>Faturamento Bruto</h2>
        <div class="value">R$ 5.523,26</div>
      </div>
      <div class="card">
        <h2>Faturamento Líquido</h2>
        <div class="value">R$ 4.328,59</div>
      </div>
      <div class="card">
        <h2>Reembolsos Totais</h2>
        <div class="value">R$ 125,66</div>
      </div>
    </section>

    <section class="grid" style="margin-top:32px;">
      <div class="card" style="grid-column: span 2;">
        <h2>Resumo das Vendas</h2>
        <canvas id="salesChart"></canvas>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./script.js"></script>

</body>
</html>
