<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <title>Dashboard de Vendas</title>

</head>
<body>
  <header>📊 Dashboard de Vendas</header>

  <main class="container">
    <section class="grid">
      <div class="card">
        <h2>Faturamento Bruto</h2>
        <div class="value" id="faturamentoBruto">R$ 0,00</div>
      </div>
      <div class="card">
        <h2>Faturamento Líquido</h2>
        <div class="value" id="faturamentoLiquido">R$ 0,00</div>
      </div>
      <div class="card">
        <h2>Reembolsos Totais</h2>
        <div class="value" id="reembolsosTotais">R$ 0,00</div>
      </div>
    </section>

    <section class="grid" style="margin-top:24px;">
      <div class="card" style="grid-column: 1 / -1;">
        <h2>Resumo das Vendas</h2>
        <canvas id="salesChart"></canvas>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./script.js"></script>
  
</body>
</html>
