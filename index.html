<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard de Vendas</title>
  <style>
    :root{
      --bg: #f5f6fa;
      --panel: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --brand: #2563eb;
      --radius: 16px;
      --shadow: 0 4px 12px rgba(0,0,0,.08);
    }
    *,*::before,*::after{ box-sizing:border-box }
    body{
      margin:0; font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu;
      background: var(--bg);
      color: var(--text);
    }
    header{
      background: var(--brand);
      color:#fff;
      padding:16px 24px;
      font-size:1.25rem;
      font-weight:600;
      box-shadow: var(--shadow);
      text-align:center;
    }
    .container{ max-width: 1200px; margin: 0 auto; padding: 16px; }
    .grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:16px; }
    .card{ background: var(--panel); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
    .card h2{ margin:0 0 10px; font-size:1rem; color: var(--muted); font-weight:500 }
    .card .value{ font-size:1.5rem; font-weight:700; margin-top:5px; }
    canvas{ width:100% !important; height:auto !important; }
    @media (max-width:600px){
      header{ font-size:1.1rem; padding:12px; }
      .card .value{ font-size:1.2rem; }
    }
    .export-row{ display:flex; justify-content:flex-end; gap:8px; margin:12px 0; }
    .btn{ background:var(--brand); color:#fff; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; }
  </style>
</head>
<body>
  <header>📊 Dashboard de Vendas</header>

  <main class="container">
    <section class="grid">
      <div class="card">
        <h2>Faturamento Bruto</h2>
        <div class="value" id="faturamentoBruto">R$ 0,00</div>
      </div>
      <div class="card">
        <h2>Faturamento Líquido</h2>
        <div class="value" id="faturamentoLiquido">R$ 0,00</div>
      </div>
      <div class="card">
        <h2>Reembolsos Totais</h2>
        <div class="value" id="reembolsosTotais">R$ 0,00</div>
      </div>
    </section>

    <section class="export-row">
      <button id="exportarBtn" class="btn">📑 Exportar para Excel</button>
    </section>

    <section class="grid" style="margin-top:24px;">
      <div class="card" style="grid-column: 1 / -1;">
        <h2>Resumo das Vendas</h2>
        <canvas id="salesChart"></canvas>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Carregar dados dinâmicos do backend em PHP + MySQL
    async function carregarDados(){
      try {
        const response = await fetch('backend.php');
        if (!response.ok) throw new Error('Resposta do backend não OK: ' + response.status);
        const dashboardData = await response.json();

        // Atualiza indicadores
        document.getElementById('faturamentoBruto').textContent = formatarMoeda(dashboardData.indicadores.faturamentoBruto || 0);
        document.getElementById('faturamentoLiquido').textContent = formatarMoeda(dashboardData.indicadores.faturamentoLiquido || 0);
        document.getElementById('reembolsosTotais').textContent = formatarMoeda(dashboardData.indicadores.reembolsos || 0);

        // Renderiza gráfico
        renderizarGrafico(dashboardData.vendasMensais || { labels: [], valores: [] });
      } catch (e){
        console.error('Erro ao carregar dados do backend', e);
        // fallback: pode-se exibir mensagem ao usuário
      }
    }

    function formatarMoeda(valor){
      return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    let chartInstance = null;
    function renderizarGrafico(vendasMensais){
      const ctx = document.getElementById('salesChart').getContext('2d');
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: vendasMensais.labels,
          datasets: [{
            label: 'Vendas (R$)',
            data: vendasMensais.valores,
            backgroundColor: 'rgba(37,99,235,0.7)',
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    // Exportar - abre exportar.php que fará download de CSV
    document.getElementById('exportarBtn').addEventListener('click', () => {
      window.location.href = 'exportar.php';
    });

    // Inicializa carregamento
    carregarDados();
  </script>
</body>
</html>
